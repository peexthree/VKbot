<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap');

        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.7;
            color: #f0e6d2;
            background: url('cards/uslugi/pdf_background_final.png') no-repeat center center;
            background-size: cover;
        }

        .container {
            padding: 45px 60px 70px 60px;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
        }

        /* Полупрозрачный overlay для читаемости текста */
        .content-wrapper {
            background: rgba(20, 15, 35, 0.78);
            border-radius: 18px;
            padding: 40px 45px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        .header img {
            max-width: 100%;
            height: auto;
        }

        /* Разделители */
        .section-divider {
            text-align: center;
            margin: 50px 0 30px 0;
        }
        .section-divider img {
            max-width: 100%;
            height: auto;
        }

        h1, h2 {
            font-family: 'Cinzel', serif;
            color: #f4d48c;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0 0 25px 0;
        }

        .user-info {
            text-align: center;
            font-size: 13.5pt;
            color: #f4d48c;
            margin: 25px 0 45px 0;
            padding: 14px 0;
            border-top: 1px solid rgba(244, 212, 140, 0.5);
            border-bottom: 1px solid rgba(244, 212, 140, 0.5);
        }

        .content {
            font-size: 13pt;
            text-align: justify;
            hyphens: auto;
        }

        .card-container {
            text-align: center;
            margin: 45px 0;
        }
        .card-image {
            max-width: 280px;
            border: 4px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5);
        }

        .highlight {
            color: #f4d48c;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content-wrapper">

            <!-- ШАПКА -->
            <div class="header">
                <img src="cards/uslugi/head2.png" alt="Персональный разбор">
            </div>

            <!-- Инфо пользователя -->
            <div class="user-info">
                ИМЯ: <span class="highlight">{{ user_name }}</span><br>
                ТОЧКА ВХОДА: {{ birth_info }}
            </div>

            <!-- ВСТУПЛЕНИЕ -->
            <div class="section-divider">
                <img src="cards/uslugi/vst.png" alt="ВСТУПЛЕНИЕ">
            </div>
            <div class="content">
                {{ text_content | safe }}
            </div>

            <!-- КАРТА ДНЯ -->
            {% if card_image_path %}
            <div class="section-divider">
                <img src="cards/uslugi/card.png" alt="КАРТА ДНЯ">
            </div>
            <div class="card-container">
                <img src="{{ card_image_path }}" class="card-image">
            </div>
            {% endif %}

            <!-- СОВЕТ ДНЯ -->
            <div class="section-divider">
                <img src="cards/uslugi/day.png" alt="СОВЕТ ДНЯ">
            </div>
            <div class="content">
                {{ advice_content | safe }}
            </div>

        </div>
    </div>
</body>
</html>
