<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap');

        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.65;
            color: #2c2c2c;
            background: url('cards/uslugi/pdf_background_final.png') no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            max-width: 100%;
            padding: 45px 55px 60px 55px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        .header img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Разделители */
        .section-divider {
            text-align: center;
            margin: 45px 0 25px 0;
        }
        .section-divider img {
            max-width: 100%;
            height: auto;
        }

        h1, h2 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 20px 0;
        }

        .user-info {
            text-align: center;
            font-size: 13pt;
            color: #d4af37;
            margin: 25px 0 40px 0;
            padding: 12px 0;
            border-top: 1px solid rgba(212, 175, 55, 0.4);
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
        }

        .content {
            font-size: 12.5pt;
            text-align: justify;
            hyphens: auto;
        }

        .card-container {
            text-align: center;
            margin: 40px 0;
        }
        .card-image {
            max-width: 260px;
            border: 3px solid #d4af37;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .highlight {
            color: #d4af37;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ШАПКА -->
        <div class="header">
            <img src="cards/uslugi/head2.png" alt="Персональный разбор">
        </div>

        <!-- Информация о пользователе -->
        <div class="user-info">
            ИМЯ: <span class="highlight">{{ user_name }}</span><br>
            ТОЧКА ВХОДА: {{ birth_info }}
        </div>

        <!-- ВСТУПЛЕНИЕ -->
        <div class="section-divider">
            <img src="cards/uslugi/vst.png" alt="ВСТУПЛЕНИЕ">
        </div>
        <div class="content">
            {{ text_content | safe }}
        </div>

        <!-- КАРТА ДНЯ -->
        {% if card_image_path %}
        <div class="section-divider">
            <img src="cards/uslugi/card.png" alt="КАРТА ДНЯ">
        </div>
        <div class="card-container">
            <img src="{{ card_image_path }}" class="card-image">
        </div>
        {% endif %}

        <!-- СОВЕТ ДНЯ -->
        <div class="section-divider">
            <img src="cards/uslugi/day.png" alt="СОВЕТ ДНЯ">
        </div>
        <div class="content">
            {{ advice_content | safe }}
        </div>

    </div>
</body>
</html>
