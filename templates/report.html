<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap');

        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.78;
            color: #f5e8c7;
            background: url('cards/uslugi/pdf_background_final.png') no-repeat center center;
            background-size: cover;
        }

        .page {
            min-height: 100vh;
            padding: 0;
            box-sizing: border-box;
        }

        /* ====================== ПЕРВАЯ СТРАНИЦА ====================== */
        .cover {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .header {
            margin-bottom: 65px;
        }
        .header img {
            max-width: 82%;
            height: auto;
        }

        .user-info {
            font-size: 15.8pt;
            color: #f4d48c;
            line-height: 1.45;
        }
        .highlight {
            color: #ffe8a3;
            font-weight: 600;
        }

        /* ====================== ВТОРАЯ СТРАНИЦА ====================== */
        .content-wrapper {
            background: rgba(18, 14, 32, 0.88);
            border-radius: 20px;
            padding: 48px 52px;
            margin: 0 55px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
        }

        .content {
            font-size: 13.4pt;
            text-align: justify;
            hyphens: auto;
        }

        /* Карта дня с чистой рамкой */
        .card-container {
            text-align: center;
            margin: 50px 0;
            position: relative;
        }
        .card-background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 335px;     /* чуть больше карты */
            height: 470px;
            z-index: 1;
        }
        .card-image {
            position: relative;
            z-index: 2;
            max-width: 280px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <!-- ПЕРВАЯ СТРАНИЦА — шапка строго по центру -->
    <div class="page cover">
        <div class="header">
            <img src="cards/uslugi/head2.png" alt="Персональный разбор">
        </div>
        <div class="user-info">
            ИМЯ: <span class="highlight">{{ user_name }}</span><br>
            ТОЧКА ВХОДА: {{ birth_info }}
        </div>
    </div>

    <!-- ВТОРАЯ СТРАНИЦА (начинается сразу) -->
    <div class="page">
        <div class="content-wrapper">

            <!-- ВСТУПЛЕНИЕ -->
            <div style="text-align:center; margin-bottom: 35px;">
                <img src="cards/uslugi/vst.png" alt="ВСТУПЛЕНИЕ" style="max-width:100%;">
            </div>

            <div class="content">
                {{ text_content | safe }}
            </div>

            <!-- КАРТА ДНЯ -->
            {% if card_image_path %}
            <div class="card-container">
                <img src="cards/uslugi/bac.png" class="card-background">
                <img src="{{ card_image_path }}" class="card-image">
            </div>
            {% endif %}

            <div class="content">
                {{ advice_content | safe }}
            </div>

        </div>
    </div>

</body>
</html>
