<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap');
        @page { size: A4; margin: 0; }
        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: url('cards/uslugi/pdf_background_final.png') no-repeat center center;
            background-size: cover;
        }
        .container { padding: 0; min-height: 100vh; box-sizing: border-box; position: relative; }

        /* ПЕРВАЯ СТРАНИЦА — head2.png на весь размер */
        .cover {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cover img.head {
            width: 100%;
            height: auto;
            max-height: 100vh;
            object-fit: contain;
        }
        /* Текст поверх head2.png */
        .user-info {
            position: absolute;
            top: 58%;               /* чуть ниже центра маскота */
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            z-index: 2;
            font-size: 16pt;
            color: #f4d48c;
            line-height: 1.6;
        }
        .highlight { color: #ffe8a3; font-weight: 600; }

        /* ВТОРАЯ И ДАЛЬШЕ СТРАНИЦЫ */
        .content-wrapper {
            background: rgba(20, 15, 35, 0.82);
            border-radius: 18px;
            padding: 40px 45px;
            margin-top: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .section-divider img { max-width: 100%; margin: 30px 0 20px 0; }
        .content { font-size: 12.8pt; text-align: justify; }

        /* КАРТА + РАМКА */
        .card-container { position: relative; display: inline-block; margin: 35px auto; }
        .card-background {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 335px;
            z-index: 3;
        }
        .card-image { position: relative; max-width: 280px; z-index: 1; }
    </style>
</head>
<body>
    <!-- ПЕРВАЯ СТРАНИЦА -->
    <div class="container cover">
        <img src="cards/uslugi/head2.png" class="head" alt="Персональный разбор">
        <div class="user-info">
            ИМЯ: <span class="highlight">{{ user_name }}</span><br>
            ТОЧКА ВХОДА: {{ birth_info }}
        </div>
    </div>
    <div style="page-break-before: always;"></div>

    <!-- ВТОРАЯ СТРАНИЦА И ДАЛЕЕ -->
    <div class="container">
        <div class="content-wrapper">
            <div class="section-divider">
                <img src="cards/uslugi/vst.png" alt="ВСТУПЛЕНИЕ">
            </div>
            <div class="content">{{ text_content | safe }}</div>

            {% if card_image_path %}
            <div class="card-container">
                <img src="cards/uslugi/bac.png" class="card-background">
                <img src="{{ card_image_path }}" class="card-image">
            </div>
            {% endif %}

            <div class="content">{{ advice_content | safe }}</div>
        </div>
    </div>
</body>
</html>
