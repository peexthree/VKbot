<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        /* Локальный шрифт Roboto */
        @font-face {
            font-family: 'Roboto';
            src: url('Roboto.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'Roboto';
            src: url('Roboto.ttf') format('truetype');
            font-weight: 600;
            font-style: normal;
        }

        @font-face {
            font-family: 'Roboto';
            src: url('Roboto.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }

        @page { 
            size: A4; 
            margin: 0; 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: url('cards/uslugi/pdf_background_final.png') no-repeat center center;
            background-size: cover;
            color: #f0e6d2;
        }

        .container {
            padding: 0;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
        }

        /* ====================== ПЕРВАЯ СТРАНИЦА ====================== */
        .cover {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cover img.head {
            width: 100%;
            height: auto;
            max-height: 100vh;
            object-fit: contain;
        }

        .user-info-wrapper {
            position: absolute;
            top: 71%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 15, 35, 0.82);
            padding: 22px 55px;
            border-radius: 16px;
            box-shadow: 0 0 45px rgba(212, 175, 55, 0.7);
            z-index: 2;
            text-align: center;
            min-width: 560px;
        }
        .user-info {
            font-size: 17pt;
            color: #f4d48c;
            line-height: 1.65;
            font-weight: 400;
        }
        .highlight { 
            color: #ffe8a3; 
            font-weight: 700; 
        }

        /* ====================== ОСНОВНОЕ СОДЕРЖИМОЕ ====================== */
        .content-wrapper {
            background: rgba(20, 15, 35, 0.85);
            border-radius: 20px;
            padding: 45px 50px;
            margin: 30px 35px;
            box-shadow: 0 12px 45px rgba(0,0,0,0.65);
        }

        .section-divider img {
            width: 780px;           /* увеличено в 1.5 раза */
            display: block;
            margin: 45px auto 35px auto;
        }

        .content {
            font-size: 13.2pt;
            text-align: justify;
            line-height: 1.68;
            font-weight: 400;
        }

        /* ====================== БЛОК КАРТЫ ====================== */
        .card-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 58vh;
            margin: 45px 0 70px 0;
            text-align: center;
        }

        .card-background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 430px;
            z-index: 2;
        }

        .card-image {
            position: relative;
            max-width: 295px;
            z-index: 3;
        }

        .card-info {
            text-align: center;
            margin-top: 48px;
            color: #f4d48c;
            font-size: 14.5pt;
            font-weight: 400;
        }

        .card-name {
            font-size: 21pt;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: 1.2px;
        }
    </style>
</head>
<body>
    <!-- ПЕРВАЯ СТРАНИЦА -->
    <div class="container cover">
        <img src="cards/uslugi/head2.png" class="head" alt="Персональный разбор">
        <div class="user-info-wrapper">
            <div class="user-info">
                ИМЯ: <span class="highlight">{{ user_name }}</span><br>
                ТОЧКА ВХОДА: {{ birth_info }}
            </div>
        </div>
    </div>
    <div style="page-break-before: always;"></div>

    <!-- ОСНОВНОЕ СОДЕРЖИМОЕ -->
    <div class="container">
        <div class="content-wrapper">
            <div class="section-divider">
                <img src="cards/uslugi/vst.png" alt="ВСТУПЛЕНИЕ">
            </div>
            
            <div class="content">{{ text_content | safe }}</div>

            <!-- КАРТА -->
            {% if card_image_path %}
            <div class="card-container">
                <img src="cards/uslugi/bac.png" class="card-background">
                <img src="{{ card_image_path }}" class="card-image">
            </div>
            <div class="card-info">
                <div class="card-name">{{ card_name }}</div>
                {{ card_description | safe }}
            </div>
            {% endif %}

            <div class="content">{{ advice_content | safe }}</div>
        </div>
    </div>
</body>
</html>
