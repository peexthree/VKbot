<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap');

        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.75;
            color: #f5e8c7;
            background: url('cards/uslugi/pdf_background_final.png') no-repeat center center;
            background-size: cover;
        }

        .container {
            padding: 60px 55px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Первая страница — чистая */
        .cover {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .header {
            margin-bottom: 60px;
        }
        .header img {
            max-width: 85%;
            height: auto;
        }

        .user-info {
            font-size: 15.5pt;
            color: #f4d48c;
            line-height: 1.5;
        }
        .highlight {
            color: #ffe8a3;
            font-weight: 600;
        }

        /* Вторая страница и дальше */
        .content-wrapper {
            background: rgba(20, 15, 35, 0.82);
            border-radius: 18px;
            padding: 45px 50px;
            box-shadow: 0 12px 45px rgba(0, 0, 0, 0.6);
        }

        .content {
            font-size: 13.2pt;
            text-align: justify;
            hyphens: auto;
        }

        /* Карта дня с красивой рамкой */
        .card-container {
            text-align: center;
            margin: 45px 0;
            position: relative;
        }
        .card-background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 440px;
        }
        .card-image {
            position: relative;
            max-width: 280px;
            border-radius: 12px;
            z-index: 2;
        }
    </style>
</head>
<body>

    <!-- ПЕРВАЯ СТРАНИЦА — только шапка по центру -->
    <div class="container cover">
        <div class="header">
            <img src="cards/uslugi/head2.png" alt="Персональный разбор">
        </div>
        <div class="user-info">
            ИМЯ: <span class="highlight">{{ user_name }}</span><br>
            ТОЧКА ВХОДА: {{ birth_info }}
        </div>
    </div>

    <div style="page-break-before: always;"></div>

    <!-- ВТОРАЯ СТРАНИЦА -->
    <div class="container">
        <div class="content-wrapper">

            <!-- ВСТУПЛЕНИЕ (оставляем разделитель) -->
            <div style="text-align:center; margin: 30px 0 25px 0;">
                <img src="cards/uslugi/vst.png" alt="ВСТУПЛЕНИЕ" style="max-width:100%;">
            </div>

            <div class="content">
                {{ text_content | safe }}
            </div>

            <!-- КАРТА ДНЯ с подложкой bac.png -->
            {% if card_image_path %}
            <div class="card-container">
                <img src="cards/uslugi/bac.png" class="card-background">
                <img src="{{ card_image_path }}" class="card-image">
            </div>
            {% endif %}

            <div class="content">
                {{ advice_content | safe }}
            </div>

        </div>
    </div>

</body>
</html>
