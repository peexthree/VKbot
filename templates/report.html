<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap');

        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.75;
            color: #f5e8c7;
            background: url('cards/uslugi/pdf_background_final.png') no-repeat center center;
            background-size: cover;
        }

        .container {
            padding: 55px 58px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Полупрозрачный overlay для читаемости */
        .content-wrapper {
            background: rgba(20, 15, 35, 0.82);
            border-radius: 18px;
            padding: 45px 50px;
            box-shadow: 0 12px 45px rgba(0, 0, 0, 0.65);
        }

        /* Первая страница — только шапка в центре */
        .cover {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .header {
            margin-bottom: 45px;
        }
        .header img {
            max-width: 100%;
            height: auto;
        }

        .user-info {
            font-size: 15pt;
            color: #f4d48c;
            line-height: 1.4;
        }
        .highlight {
            color: #ffe8a3;
            font-weight: 600;
        }

        .content {
            font-size: 13.2pt;
            text-align: justify;
            hyphens: auto;
        }

        .card-container {
            text-align: center;
            margin: 50px 0;
        }
        .card-image {
            max-width: 280px;
            border: 4px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        /* Разделитель только для ВСТУПЛЕНИЕ */
        .section-divider {
            text-align: center;
            margin: 35px 0 30px 0;
        }
        .section-divider img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <!-- ПЕРВАЯ СТРАНИЦА (только шапка + данные) -->
    <div class="container cover">
        <div class="header">
            <img src="cards/uslugi/head2.png" alt="Персональный разбор">
        </div>
        <div class="user-info">
            ИМЯ: <span class="highlight">{{ user_name }}</span><br>
            ТОЧКА ВХОДА: {{ birth_info }}
        </div>
    </div>

    <div style="page-break-before: always;"></div>

    <!-- ВТОРАЯ СТРАНИЦА И ДАЛЬШЕ -->
    <div class="container">
        <div class="content-wrapper">

            <!-- Только ВСТУПЛЕНИЕ (разделитель) -->
            <div class="section-divider">
                <img src="cards/uslugi/vst.png" alt="ВСТУПЛЕНИЕ">
            </div>

            <div class="content">
                {{ text_content | safe }}
            </div>

            <!-- КАРТА ДНЯ (без разделителя) -->
            {% if card_image_path %}
            <div class="card-container">
                <img src="{{ card_image_path }}" class="card-image">
            </div>
            {% endif %}

            <!-- СОВЕТ ДНЯ (без разделителя) -->
            <div class="content">
                {{ advice_content | safe }}
            </div>

        </div>
    </div>

</body>
</html>
