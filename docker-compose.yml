version: "3.8"
services:
  bot:
    build: .
    environment:
      - VK_TOKEN=${VK_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - REDIS_URL=${REDIS_URL}
      - PORT=10000
    ports:
      - "10000:10000"
    restart: always
