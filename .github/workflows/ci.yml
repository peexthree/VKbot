name: CI

on:
  push:
    branches: [ main, dev, jules-* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry config virtualenvs.create false
        poetry install --no-root --no-cache
        pip install ruff pytest pytest-asyncio mypy

    - name: Lint with Ruff
      run: |
        ruff check . --output-format=github

    - name: Check types with mypy
      run: |
        mypy . --ignore-missing-imports --no-strict-optional || true

    - name: Run tests
      run: |
        PYTHONPATH=. pytest -v --asyncio-mode=auto

    - name: Summary
      if: always()
      run: |
        echo "CI completed for Python ${{ matrix.python-version }}"